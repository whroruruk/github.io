name: Enrich English Metadata

# data.csv의 비어있는 `도서명_en`을 Google Books / Open Library에서 자동 조회.
# 자동 제안값엔 `?` 접두사가 붙어 빌드 시 노출되지 않으므로,
# PR을 검토하며 잘못된 매칭은 그대로 두고 맞는 것만 `?`를 제거하면 됨.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: '최대 처리 행 수 (0=무제한)'
        required: false
        default: '0'
      refresh:
        description: '?접두사 제안값도 다시 조회'
        required: false
        default: 'false'
        type: boolean
  schedule:
    # 매월 1일 02:00 UTC (KST 11:00) — 새로 추가된 책의 영문 제목 자동 제안
    - cron: '0 2 1 * *'

jobs:
  enrich:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Run enricher
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.limit }}" != "" ] && [ "${{ github.event.inputs.limit }}" != "0" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi
          if [ "${{ github.event.inputs.refresh }}" = "true" ]; then
            ARGS="$ARGS --refresh"
          fi
          python3 enrich_en.py $ARGS

      - name: Check if data.csv changed
        id: diff
        run: |
          if git diff --quiet data.csv; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: 영문 도서 제목 자동 제안 갱신"
          title: "chore: 영문 도서 제목 자동 제안 (검수 필요)"
          body: |
            ## 영문 메타데이터 자동 제안

            `enrich_en.py`가 Google Books / Open Library에서 조회한 영문 제목 제안값입니다.
            모든 제안값엔 **`?` 접두사**가 붙어있어 그 상태로 머지해도 사이트에 노출되지 않습니다.

            ### 검수 방법
            1. `data.csv`의 `도서명_en` 열에서 `?`로 시작하는 값 확인
            2. 매칭이 **정확하면** → `?` 제거 후 커밋
            3. 매칭이 **틀렸으면** → 빈 값으로 두거나 직접 영문판 제목 입력
            4. **확신이 안 서면** → `?` 그대로 두기 (빌드에서 무시됨)

            검수 완료된 항목만 `/en/` 페이지에 노출됩니다.
          branch: enrich/en-suggestions
          delete-branch: true
          base: ${{ github.ref_name }}

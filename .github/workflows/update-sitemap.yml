name: Update Sitemap & Request Indexing

on:
  push:
    paths:
      - 'data.csv'   # data.csv가 바뀔 때만 실행

jobs:
  sitemap-and-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate sitemap and share pages
        run: |
          python3 - <<'EOF'
          import csv, datetime, os
          from urllib.parse import quote

          BASE = "https://hwiruruk.github.io/favoread/"
          TODAY = datetime.date.today().isoformat()

          celebs = {}
          with open("data.csv", encoding="utf-8") as f:
              reader = csv.reader(f)
              headers = next(reader)
              
              # 이미지 주소가 있는 열 찾기 (기본값 7)
              img_col = 7 
              for i, h in enumerate(headers):
                  if any(w in h.lower() for w in ['연예인이미지', 'photo', '이미지주소']):
                      img_col = i
                      break
                      
              for row in reader:
                  if row and row[0].strip():
                      name = row[0].strip()
                      img_url = row[img_col].strip() if len(row) > img_col else ""
                      if not img_url.startswith('http'):
                          img_url = f"{BASE}favicon.png"
                      celebs[name] = img_url

          # share 폴더 만들기
          os.makedirs("share", exist_ok=True)
          
          lines = [
              '<?xml version="1.0" encoding="UTF-8"?>',
              '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">',
              '  <url>',
              '    <loc>https://hwiruruk.github.io/readinglab/</loc>',
              f'    <lastmod>{TODAY}</lastmod>',
              '    <priority>0.8</priority>',
              '  </url>',
              '  <url>',
              f'    <loc>{BASE}</loc>',
              f'    <lastmod>{TODAY}</lastmod>',
              '    <priority>1.0</priority>',
              '  </url>',
          ]

          for name, img in celebs.items():
              safe_name = quote(name, safe="()")
              
              # 1. 인물별 고유 HTML 페이지(공유용) 생성
              html = f"""<!DOCTYPE html>
          <html lang="ko">
          <head>
              <meta charset="utf-8">
              <title>{name} | 최애의 독서</title>
              <meta property="og:title" content="{name} | 최애의 독서">
              <meta property="og:description" content="당신이 좋아하는 {name}의 독서 기록을 확인해보세요!">
              <meta property="og:image" content="{img}">
              <meta property="og:url" content="{BASE}share/{name}.html">
              <meta name="twitter:card" content="summary_large_image">
              <meta http-equiv="refresh" content="0; url={BASE}?celeb={safe_name}">
          </head>
          <body>
              <script>window.location.replace("{BASE}?celeb={safe_name}");</script>
          </body>
          </html>"""
              with open(f"share/{name}.html", "w", encoding="utf-8") as f:
                  f.write(html)
              
              # 2. 사이트맵 추가
              lines += [
                  '  <url>',
                  f'    <loc>{BASE}?celeb={safe_name}</loc>',
                  f'    <lastmod>{TODAY}</lastmod>',
                  '    <priority>0.7</priority>',
                  '  </url>',
              ]

          lines.append('</urlset>')
          with open("sitemap.xml", "w", encoding="utf-8") as f:
              f.write('\n'.join(lines) + '\n')

          print(f"✅ 공유 페이지 및 사이트맵 생성 완료: 총 {len(celebs)}명")
          EOF

      # (이 사이에 있는 Detect new & removed celebs 와 Request indexing 부분은 원래 코드 그대로 둡니다)

      - name: Commit & push sitemap and share pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml share/
          git diff --cached --quiet || git commit -m "chore: sitemap 및 개별 공유 페이지 자동 갱신 ($(date '+%Y-%m-%d'))"
          git push

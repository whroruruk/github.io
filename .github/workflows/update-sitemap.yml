name: Update Site Data

on:
  push:
    paths:
      - 'data.csv'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # lastmod 정확도를 위해 git 히스토리 전체 필요
          fetch-depth: 0

      - name: Run generator
        run: python3 generate.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A data.json sitemap.xml share/ en/ index.html robots.txt feed.xml
          git diff --cached --quiet || git commit -m "chore: data.json·sitemap·share·index·en 자동 갱신 [$(date +%Y-%m-%d)]"
          git push

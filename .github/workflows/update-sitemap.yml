name: Update Site Data

on:
  push:
    paths:
      - 'data.csv'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Run generator
        run: python3 generate.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json sitemap.xml share/ index.html
          git diff --cached --quiet || git commit -m "chore: data.json·sitemap·share·index 자동 갱신 [$(date +%Y-%m-%d)]"
          git push

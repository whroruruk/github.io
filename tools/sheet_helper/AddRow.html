<!DOCTYPE html>
<html>
<head>
<base target="_top">
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 16px; color: #222; line-height: 1.5; }
  h2 { margin: 0 0 12px; font-size: 16px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 4px; }
  .field input, .field textarea { width: 100%; padding: 8px 10px; border: 2px solid #000; box-shadow: 2px 2px 0 0 #000; font-size: 13px; box-sizing: border-box; }
  .field input:focus, .field textarea:focus { outline: none; box-shadow: 3px 3px 0 0 #000; transform: translate(-1px, -1px); }
  .req { color: #dc2626; }
  .small { font-size: 11px; color: #666; margin-top: 2px; }
  button { padding: 10px 20px; border: 2px solid #000; box-shadow: 3px 3px 0 0 #000; background: #fde047; font-weight: 700; font-size: 13px; cursor: pointer; }
  button:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 0 #000; }
  button:active { transform: translate(0, 0); box-shadow: 2px 2px 0 0 #000; }
  button[disabled] { opacity: .5; cursor: not-allowed; }
  .button-row { display: flex; gap: 10px; margin-top: 16px; }
  .cancel { background: #fff; }
  .status { margin-top: 12px; padding: 10px; font-size: 13px; }
  .status.ok { background: #dcfce7; border: 2px solid #16a34a; }
  .status.err { background: #fee2e2; border: 2px solid #dc2626; }

  /* 알라딘 검색 패널 */
  .search-panel { background: #fffbe9; border: 2px solid #000; box-shadow: 3px 3px 0 0 #000; padding: 12px; margin-bottom: 16px; }
  .search-panel h3 { margin: 0 0 8px; font-size: 13px; font-weight: 800; }
  .search-row { display: flex; gap: 6px; }
  .search-row input { flex: 1; padding: 6px 10px; border: 2px solid #000; box-shadow: 1px 1px 0 0 #000; font-size: 12px; box-sizing: border-box; }
  .search-row button { padding: 6px 12px; font-size: 12px; box-shadow: 1px 1px 0 0 #000; }
  .results { margin-top: 10px; max-height: 280px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
  .result-item { display: flex; gap: 8px; padding: 6px; background: #fff; border: 1px solid #000; cursor: pointer; }
  .result-item:hover { background: #fef3c7; }
  .result-item img { width: 36px; height: 50px; object-fit: cover; border: 1px solid #ccc; flex-shrink: 0; }
  .result-item .info { flex: 1; min-width: 0; font-size: 11px; line-height: 1.3; }
  .result-item .t { font-weight: 700; }
  .result-item .m { color: #666; }
  .result-item.picked { background: #dcfce7; }
  .empty-msg { padding: 8px; color: #666; font-size: 11px; text-align: center; }
</style>
</head>
<body>

<!-- 알라딘 검색 (선택) -->
<div class="search-panel">
  <h3>🔍 알라딘에서 검색해서 자동 채우기 (선택)</h3>
  <div class="search-row">
    <input type="text" id="search-q" placeholder="책 제목 또는 키워드 (예: 채식주의자, 한강)" autocomplete="off">
    <button type="button" id="search-btn" onclick="searchBooks()">검색</button>
  </div>
  <div id="search-results" class="results"></div>
</div>

<form id="form">
  <div class="field">
    <label>연예인 <span class="req">*</span></label>
    <input type="text" id="celeb" list="celebs-list" required autocomplete="off">
    <datalist id="celebs-list">
      <? suggestions.celebs.forEach(function(c) { ?>
        <option value="<?= c ?>"></option>
      <? }); ?>
    </datalist>
    <div class="small">예: RM(BTS), 아이유, 박서준 — 기존 셀럽이면 자동완성</div>
  </div>

  <div class="field">
    <label>도서명 <span class="req">*</span></label>
    <input type="text" id="book" list="books-list" required autocomplete="off">
    <datalist id="books-list">
      <? suggestions.books.forEach(function(b) { ?>
        <option value="<?= b ?>"></option>
      <? }); ?>
    </datalist>
  </div>

  <div class="field">
    <label>저자 <span class="req">*</span></label>
    <input type="text" id="author" list="authors-list" required autocomplete="off">
    <datalist id="authors-list">
      <? suggestions.authors.forEach(function(a) { ?>
        <option value="<?= a ?>"></option>
      <? }); ?>
    </datalist>
  </div>

  <div class="field">
    <label>출판사 <span class="req">*</span></label>
    <input type="text" id="publisher" list="publishers-list" required autocomplete="off">
    <datalist id="publishers-list">
      <? suggestions.publishers.forEach(function(p) { ?>
        <option value="<?= p ?>"></option>
      <? }); ?>
    </datalist>
  </div>

  <div class="field">
    <label>출처 URL <span class="req">*</span></label>
    <input type="url" id="source" placeholder="https://..." required>
    <div class="small">유튜브, 인터뷰, SNS 등 검증 가능한 출처 링크</div>
  </div>

  <div class="field">
    <label>도서 정보 URL <span class="small">(비워두면 알라딘 API 자동 조회)</span></label>
    <input type="url" id="bookInfo" placeholder="자동 조회 (또는 https://www.aladin.co.kr/shop/wproduct.aspx?ItemId=...)">
    <div class="small">GET_ALADIN_API_URL 함수가 같은 프로젝트에 있으면 자동 호출됨</div>
  </div>

  <div class="field">
    <label>도서 이미지 URL <span class="small">(비워두면 알라딘 API 자동 조회)</span></label>
    <input type="url" id="bookImage" placeholder="자동 조회 (또는 https://image.aladin.co.kr/...)">
    <div class="small">GET_ALADIN_COVER 함수가 같은 프로젝트에 있으면 자동 호출됨</div>
  </div>

  <div class="field">
    <label>연예인 이미지 URL <span class="small">(선택)</span></label>
    <input type="url" id="celebImage" placeholder="https://upload.wikimedia.org/...">
    <div class="small">이미 등록된 셀럽이면 비워둬도 OK</div>
  </div>

  <div class="field">
    <label>코멘트 <span class="small">(선택)</span></label>
    <textarea id="comment" rows="2" placeholder="짧은 메모"></textarea>
  </div>

  <div class="button-row">
    <button type="submit" id="submit-btn">저장</button>
    <? if (typeof standalone === 'undefined' || !standalone) { ?>
      <button type="button" class="cancel" onclick="google.script.host.close()">취소</button>
    <? } ?>
  </div>

  <div id="status"></div>
</form>

<script>
const $ = (id) => document.getElementById(id);

// ── 알라딘 검색 ────────────────────────────────
$('search-q').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); searchBooks(); }
});

function searchBooks() {
  const q = $('search-q').value.trim();
  if (!q) return;
  const btn = $('search-btn');
  btn.disabled = true;
  btn.textContent = '검색중';
  $('search-results').innerHTML = '<div class="empty-msg">⏳ 알라딘 조회 중...</div>';

  google.script.run
    .withSuccessHandler((data) => {
      btn.disabled = false;
      btn.textContent = '검색';
      if (data.error) {
        $('search-results').innerHTML = '<div class="empty-msg" style="color:#dc2626">' + data.error + '</div>';
        return;
      }
      if (!data.items || !data.items.length) {
        $('search-results').innerHTML = '<div class="empty-msg">검색 결과 없음</div>';
        return;
      }
      window._searchResults = data.items;
      renderResults(data.items);
    })
    .withFailureHandler((err) => {
      btn.disabled = false;
      btn.textContent = '검색';
      $('search-results').innerHTML = '<div class="empty-msg" style="color:#dc2626">' + err.message + '</div>';
    })
    .searchAladinBooks(q, 10);
}

function renderResults(items) {
  $('search-results').innerHTML = items.map((it, i) => `
    <div class="result-item" id="ri-${i}" onclick="pickBook(${i})">
      <img src="${escAttr(it.cover)}" alt="" onerror="this.style.display='none'">
      <div class="info">
        <div class="t">${esc(it.title)}</div>
        <div class="m">${esc(it.author)} · ${esc(it.publisher)}${it.pubDate ? ' · ' + esc(it.pubDate) : ''}</div>
      </div>
    </div>
  `).join('');
}

function pickBook(idx) {
  const it = window._searchResults[idx];
  $('book').value = it.title || '';
  $('author').value = (it.author || '').replace(/\s*\(지은이\)\s*/g, '').replace(/\s*\(옮긴이\)[^,]*/g, '').trim();
  $('publisher').value = it.publisher || '';
  $('bookInfo').value = it.link || '';
  $('bookImage').value = it.cover || '';
  // 시각적 피드백
  document.querySelectorAll('.result-item').forEach(el => el.classList.remove('picked'));
  document.getElementById('ri-' + idx).classList.add('picked');
  // 폼 영역으로 스크롤
  $('book').scrollIntoView({ behavior: 'smooth', block: 'center' });
  $('book').focus();
}

function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escAttr(s) { return esc(s); }

// ── 폼 제출 ────────────────────────────────
document.getElementById('form').addEventListener('submit', (e) => {
  e.preventDefault();
  const btn = $('submit-btn');
  btn.disabled = true;
  btn.textContent = '저장 중...';
  $('status').innerHTML = '';

  const payload = {
    celeb:      $('celeb').value.trim(),
    book:       $('book').value.trim(),
    author:     $('author').value.trim(),
    publisher:  $('publisher').value.trim(),
    source:     $('source').value.trim(),
    bookInfo:   $('bookInfo').value.trim(),
    bookImage:  $('bookImage').value.trim(),
    celebImage: $('celebImage').value.trim(),
    comment:    $('comment').value.trim(),
  };

  google.script.run
    .withSuccessHandler((res) => {
      let extra = '';
      if (res.bookInfoAuto)  extra += '<div class="small">🔗 도서 정보 자동: ' + res.bookInfoAuto + '</div>';
      if (res.bookImageAuto) extra += '<div class="small">🖼️ 도서 이미지 자동: ' + res.bookImageAuto + '</div>';
      $('status').innerHTML = '<div class="status ok">✅ ' + res.rowNum + '행에 추가됨.' + extra + '</div>';
      btn.disabled = false;
      btn.textContent = '저장';
      // 입력값 초기화 (자주 안 바뀌는 셀럽 빼고)
      ['book', 'author', 'publisher', 'source', 'bookInfo', 'bookImage', 'comment'].forEach(id => $(id).value = '');
    })
    .withFailureHandler((err) => {
      $('status').innerHTML = '<div class="status err">❌ ' + err.message + '</div>';
      btn.disabled = false;
      btn.textContent = '저장';
    })
    .appendRow(payload);
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  
  <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
  <link href="[https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;400;600;900&family=Space+Grotesk:wght@400;700&display=swap](https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;400;600;900&family=Space+Grotesk:wght@400;700&display=swap)" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['"Noto Serif KR"', 'serif'],
            sans:  ['"Space Grotesk"', 'sans-serif'],
          },
          colors: {
            ink: '#000000', paper: '#ffffff', 'paper-dark': '#f4f4f0',
            muted: '#666666', 'neo-mint': '#a7f3d0', 'neo-pink': '#fbcfe8', 'neo-yellow': '#fde047',
          },
          boxShadow: {
            neo: '4px 4px 0px 0px rgba(0,0,0,1)',
            'neo-lg': '8px 8px 0px 0px rgba(0,0,0,1)',
            'neo-sm': '2px 2px 0px 0px rgba(0,0,0,1)',
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #fcfaf5; color: #000; -webkit-font-smoothing: antialiased; }
    ::selection { background: #fde047; color: #000; }
    .celeb-portrait { transition: transform .4s ease; }
    .group:hover .celeb-portrait { transform: scale(1.05); }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    
    .book-link {
      display: inline-flex; align-items: center; gap: 3px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px; font-weight: 700; letter-spacing: .08em;
      color: #000; border-bottom: 1.5px solid #000;
      padding-bottom: 1px; text-decoration: none;
      transition: opacity .15s;
    }
    .book-link:hover { opacity: .45; }

    /* 이전 디자인의 모바일 모달 CSS 완벽 복원 */
    @media (max-width: 767px) {
      #modal-inner {
        position: fixed !important; bottom: 0; left: 0; right: 0; top: auto !important; transform: none !important;
        width: 100% !important; max-width: 100% !important; max-height: 90svh; height: auto;
        border-radius: 16px 16px 0 0; border: 2px solid #000; border-bottom: none;
        flex-direction: column !important; overflow: hidden; box-shadow: 0 -8px 40px rgba(0,0,0,.18);
      }
      #modal-left { width: 100% !important; flex-direction: row !important; align-items: center !important; justify-content: flex-start !important; border-bottom: 2px solid #000 !important; border-right: none !important; padding: 10px 48px 10px 14px !important; gap: 10px !important; }
      #modal-photo-wrap { width: 44px !important; height: 56px !important; flex-shrink: 0; border: 1.5px solid #000; overflow: hidden; margin-bottom: 0 !important; }
      #modal-meta { flex: 1; min-width: 0; flex-direction: row !important; align-items: center !important; gap: 8px !important; padding-right: 0 !important; margin-bottom: 0 !important; }
      #modal-name  { font-size: 15px !important; margin-bottom: 0 !important; }
      #modal-count { font-size: 8px !important; white-space: nowrap; margin-top: 0 !important; }
      #share-btn   { font-size: 11px !important; padding: 5px 10px !important; margin: 0 !important; }
      #modal-right { width: 100% !important; padding: 0 !important; }
      #modal-archive-label { padding: 8px 14px 6px !important; font-size: 9px !important; }
      #swiper-viewport { height: 280px !important; margin: 0 !important; }
      #modal-nav-bar { padding: 8px 14px !important; }
    }
  </style>
</head>
<body class="font-serif">
  {{ content }}
</body>
</html>

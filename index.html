<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>최애의 독서 | 당신이 좋아하는, 그들이 읽은 책</title>
  <meta name="google-site-verification" content="RGTC9c8GtMgvT1HtDz5vzgXPGl9f-DSDOq1lCW95In8" />
  <meta name="description" content="아이돌, 셀럽, 연예인 나의 최애가 읽은 책, 추천 책, 인생책을 한곳에 모았어요✨">
  <meta name="keywords" content="아이돌, 셀럽, 연예인, 최애, 독서, 책, 읽는, 책 추천, 인생책, 읽은 책, 책추천, kpop star reading, kpop star book">
  <meta name="referrer" content="no-referrer">
  
  <link rel="icon" href="https://hwiruruk.github.io/favoread/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="https://hwiruruk.github.io/favoread/favicon.png">
  <link rel="shortcut icon" href="https://hwiruruk.github.io/favoread/favicon.png">
  
  <meta name="thumbnail" content="https://hwiruruk.github.io/favoread/favicon.png" />
  
  <meta property="og:site_name" content="최애의 독서">
  <meta property="og:title" content="최애의 독서 | 당신이 좋아하는, 그들이 읽은 책">
  <meta property="og:description" content="아이돌, 셀럽, 연예인 나의 최애가 읽은 책, 추천 책, 인생책을 한곳에 모았어요✨">
  <meta property="og:image" content="https://hwiruruk.github.io/favoread/favicon.png">
  <meta property="og:url" content="https://hwiruruk.github.io/favoread/">
  <meta property="og:type" content="website">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
    body { font-family: 'Noto-Sans-KR', sans-serif; background-color: #f8fafc; }
    .book-card { transition: all 0.3s ease; }
    .book-card:hover { transform: translateY(-5px); }
    .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    .celeb-img-container { position: relative; overflow: hidden; border-radius: 50%; width: 100px; height: 100px; margin: 0 auto; border: 3px solid #fff; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    .celeb-img { width: 100%; height: 100%; object-fit: cover; }
    #modal-viewport { scroll-snap-type: x mandatory; display: flex; overflow-x: auto; overflow-y: hidden; }
    .modal-slide { scroll-snap-align: start; flex: 0 0 100%; width: 100%; height: 100%; display: flex; flex-direction: column; }
  </style>
</head>
<body class="text-slate-800">

  <nav class="sticky top-0 z-40 glass border-b border-white">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
      <h1 class="text-xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent cursor-pointer" onclick="location.href='https://hwiruruk.github.io/favoread/'">
        최애의 독서 <span class="text-sm font-normal text-slate-400 ml-1">Archive</span>
      </h1>
      <div class="relative w-48 md:w-64">
        <input type="text" id="searchInput" placeholder="연예인 또는 도서 검색..." 
          class="w-full pl-9 pr-4 py-2 bg-white/50 border border-slate-200 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
        <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-slate-400"></i>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <div id="loading" class="flex flex-col items-center justify-center py-20">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
      <p class="text-slate-500 animate-pulse">아카이브를 불러오고 있습니다...</p>
    </div>

    <div id="celebGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6 opacity-0 transition-opacity duration-500">
      </div>
  </main>

  <div id="modalOverlay" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
    <div class="bg-white rounded-3xl w-full max-w-lg overflow-hidden shadow-2xl flex flex-col relative h-[85vh] md:h-auto md:max-h-[90vh]">
      
      <div class="absolute top-4 right-4 z-50 flex gap-2">
        <button id="shareBtn" class="w-10 h-10 flex items-center justify-center bg-white/20 hover:bg-white/40 backdrop-blur-md rounded-full text-white transition-colors">
          <i class="fa-solid fa-share-nodes"></i>
        </button>
        <button id="closeModal" class="w-10 h-10 flex items-center justify-center bg-white/20 hover:bg-white/40 backdrop-blur-md rounded-full text-white transition-colors">
          <i class="fa-solid fa-xmark text-lg"></i>
        </button>
      </div>

      <div id="modal-viewport" class="hide-scroll flex-1">
        </div>

      <button id="prevBtn" class="absolute left-2 top-1/2 -translate-y-1/2 z-40 w-10 h-10 flex items-center justify-center bg-white/10 hover:bg-white/30 rounded-full text-white transition-all">
        <i class="fa-solid fa-chevron-left"></i>
      </button>
      <button id="nextBtn" class="absolute right-2 top-1/2 -translate-y-1/2 z-40 w-10 h-10 flex items-center justify-center bg-white/10 hover:bg-white/30 rounded-full text-white transition-all">
        <i class="fa-solid fa-chevron-right"></i>
      </button>

      <div id="slideCounter" class="absolute bottom-4 left-1/2 -translate-x-1/2 z-40 px-3 py-1 bg-black/30 backdrop-blur-sm rounded-full text-[10px] text-white/80 font-medium">
        1 / 1
      </div>
    </div>
  </div>

  <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[60] px-6 py-3 bg-slate-800 text-white text-sm rounded-full shadow-lg opacity-0 translate-y-4 transition-all duration-300 pointer-events-none">
    공유 링크가 복사되었습니다!
  </div>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSAn7L8PAslq927m54-l8G_T9HscV8f_7FzZ6Y-Y2-O2m8WwX_8q_vB8iR2qI0I9n6B3wYwJ6W2I0I9/pub?gid=0&output=csv";
    const D = {
      grid: document.getElementById('celebGrid'),
      loading: document.getElementById('loading'),
      search: document.getElementById('searchInput'),
      overlay: document.getElementById('modalOverlay'),
      viewport: document.getElementById('modal-viewport'),
      closeBtn: document.getElementById('closeModal'),
      shareBtn: document.getElementById('shareBtn'),
      prevBtn: document.getElementById('prevBtn'),
      nextBtn: document.getElementById('nextBtn'),
      counter: document.getElementById('slideCounter'),
      toast: document.getElementById('toast')
    };

    let allData = [];
    let celebGroups = {};
    let modal = { open: false, celeb: '', idx: 0, items: [] };

    // CSV 파싱
    function parseCSV(text) {
      const lines = text.split('\n');
      return lines.slice(1).map(line => {
        const parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
        return parts.map(p => p.trim().replace(/^"|"$/g, ''));
      }).filter(row => row[0]);
    }

    async function init() {
      try {
        const res = await fetch(CSV_URL);
        const text = await res.text();
        allData = parseCSV(text);

        // 연예인별 그룹화 및 책 중복 카운트 준비
        const bookCountMap = {};
        allData.forEach(row => {
          const title = row[1];
          bookCountMap[title] = (bookCountMap[title] || 0) + 1;
        });

        allData.forEach(row => {
          const name = row[0];
          if (!celebGroups[name]) {
            celebGroups[name] = { 
              name, 
              img: row[7] || 'https://hwiruruk.github.io/favoread/favicon.png', 
              items: [] 
            };
          }
          // 원본 카운트 정보를 아이템에 포함시킴
          celebGroups[name].items.push({
            title: row[1],
            author: row[2],
            publisher: row[3],
            source: row[4],
            link: row[5],
            cover: row[6],
            count: bookCountMap[row[1]] // 이 책을 총 몇 명이 읽었는지 저장
          });
        });

        renderGrid(Object.values(celebGroups));
        D.loading.classList.add('hidden');
        D.grid.classList.remove('opacity-0');

        // URL 파라미터 체크
        const urlParams = new URLSearchParams(window.location.search);
        const celebParam = urlParams.get('celeb');
        if (celebParam && celebGroups[celebParam]) {
          openModal(celebParam);
        }

      } catch (err) {
        console.error(err);
        D.loading.innerHTML = '<p class="text-red-500">데이터를 불러오지 못했습니다.</p>';
      }
    }

    function renderGrid(groups) {
      D.grid.innerHTML = groups.map(g => `
        <div class="book-card bg-white p-4 rounded-2xl shadow-sm border border-slate-100 cursor-pointer text-center" 
             onclick="openModal('${g.name}')">
          <div class="celeb-img-container mb-3">
            <img src="${g.img}" class="celeb-img" alt="${g.name}" loading="lazy">
          </div>
          <h3 class="font-bold text-slate-800 text-sm md:text-base">${g.name}</h3>
          <p class="text-blue-500 text-xs mt-1 font-medium">${g.items.length}권의 기록</p>
        </div>
      `).join('');
    }

    function openModal(celebName, skipHistory = false) {
      const group = celebGroups[celebName];
      if (!group) return;

      modal.celeb = celebName;
      modal.items = group.items;
      modal.idx = 0;
      modal.open = true;

      D.viewport.innerHTML = modal.items.map((item, i) => `
        <div class="modal-slide">
          <div class="h-64 md:h-80 relative flex items-center justify-center p-8" style="background-color: #f1f5f9;">
            <div class="absolute inset-0 opacity-20" style="background-image: url('${group.img}'); background-size: cover; background-position: center; filter: blur(20px);"></div>
            <img src="${item.cover || 'https://hwiruruk.github.io/favoread/favicon.png'}" 
                 class="relative z-10 h-full shadow-2xl rounded-lg object-contain bg-white" 
                 alt="${item.title}"
                 onerror="this.src='https://hwiruruk.github.io/favoread/favicon.png'">
          </div>
          <div class="p-6 md:p-8 flex-1 flex flex-col">
            <div class="mb-6">
              <span class="inline-block px-2 py-1 bg-blue-100 text-blue-600 text-[10px] font-bold rounded-md mb-2 uppercase tracking-wider">Reading Archive</span>
              <h2 class="text-xl md:text-2xl font-bold text-slate-900 leading-tight mb-2">${item.title}</h2>
              <p class="text-slate-500 text-sm">${item.author} · ${item.publisher}</p>
            </div>
            
            <div class="mt-auto space-y-3">
              <a href="${item.link}" target="_blank" class="flex items-center justify-between p-4 bg-slate-50 hover:bg-blue-50 border border-slate-100 rounded-xl transition-all group">
                <div class="flex items-center gap-3">
                  <div class="w-10 h-10 flex items-center justify-center bg-white rounded-full shadow-sm text-blue-500 group-hover:scale-110 transition-transform">
                    <i class="fa-solid fa-book-open"></i>
                  </div>
                  <div>
                    <p class="text-xs text-slate-400 font-medium">도서 상세 정보</p>
                    <p class="text-sm font-bold text-slate-700">도서 정보 확인하기</p>
                  </div>
                </div>
                <i class="fa-solid fa-arrow-right text-slate-300 group-hover:text-blue-500 transition-colors"></i>
              </a>

              <a href="${item.source}" target="_blank" class="flex items-center justify-between p-4 bg-slate-50 hover:bg-indigo-50 border border-slate-100 rounded-xl transition-all group">
                <div class="flex items-center gap-3">
                  <div class="w-10 h-10 flex items-center justify-center bg-white rounded-full shadow-sm text-indigo-500 group-hover:scale-110 transition-transform">
                    <i class="fa-solid fa-link"></i>
                  </div>
                  <div>
                    <p class="text-xs text-slate-400 font-medium">출처 및 인용</p>
                    <p class="text-sm font-bold text-slate-700">근거 자료 바로가기 ${item.count > 1 ? `<span class="ml-1 text-xs text-blue-500">(외 ${item.count - 1}명이 읽음)</span>` : ''}</p>
                  </div>
                </div>
                <i class="fa-solid fa-arrow-right text-slate-300 group-hover:text-indigo-500 transition-colors"></i>
              </a>
            </div>
          </div>
        </div>
      `).join('');

      updateSlideUI();
      
      D.overlay.classList.remove('hidden');
      setTimeout(() => D.overlay.classList.add('opacity-100'), 10);
      document.body.style.overflow = 'hidden';

      if (!skipHistory) {
        const url = new URL(window.location);
        url.searchParams.set('celeb', celebName);
        window.history.pushState({ celeb: celebName }, '', url);
      }
    }

    function closeModal(skipHistory = false) {
      D.overlay.classList.remove('opacity-100');
      setTimeout(() => {
        D.overlay.classList.add('hidden');
        modal.open = false;
        document.body.style.overflow = '';
      }, 300);

      if (!skipHistory) {
        const url = new URL(window.location);
        url.searchParams.delete('celeb');
        window.history.pushState({}, '', url);
      }
    }

    function updateSlideUI() {
      D.counter.innerText = `${modal.idx + 1} / ${modal.items.length}`;
      D.prevBtn.style.opacity = modal.idx === 0 ? '0' : '1';
      D.prevBtn.style.pointerEvents = modal.idx === 0 ? 'none' : 'auto';
      D.nextBtn.style.opacity = modal.idx === modal.items.length - 1 ? '0' : '1';
      D.nextBtn.style.pointerEvents = modal.idx === modal.items.length - 1 ? 'none' : 'auto';
    }

    function goSlide(i) {
      if (i < 0 || i >= modal.items.length) return;
      modal.idx = i;
      D.viewport.scrollTo({ left: D.viewport.offsetWidth * i, behavior: 'smooth' });
      updateSlideUI();
    }

    // 이벤트 리스너
    D.search.addEventListener('input', (e) => {
      const val = e.target.value.toLowerCase();
      const filtered = Object.values(celebGroups).filter(g => 
        g.name.toLowerCase().includes(val) || 
        g.items.some(item => item.title.toLowerCase().includes(val))
      );
      renderGrid(filtered);
    });

    D.closeBtn.addEventListener('click', () => closeModal());
    
    D.overlay.addEventListener('click', (e) => {
      if (e.target === D.overlay) closeModal();
    });

    D.shareBtn.addEventListener('click', async () => {
      const shareUrl = `${window.location.origin}${window.location.pathname}?celeb=${encodeURIComponent(modal.celeb)}`;
      try {
        await navigator.clipboard.writeText(shareUrl);
        D.toast.classList.remove('opacity-0', 'translate-y-4');
        setTimeout(() => D.toast.classList.add('opacity-0', 'translate-y-4'), 3000);
      } catch {
        prompt('링크 복사:', shareUrl);
      }
    });

    D.prevBtn.addEventListener('click', () => goSlide(modal.idx - 1));
    D.nextBtn.addEventListener('click', () => goSlide(modal.idx + 1));

    document.addEventListener('keydown', e => {
      if (!modal.open) return;
      if (e.key === 'Escape') closeModal();
      if (e.key === 'ArrowLeft') goSlide(modal.idx - 1);
      if (e.key === 'ArrowRight') goSlide(modal.idx + 1);
    });

    window.addEventListener('popstate', (e) => {
      if (e.state && e.state.celeb) {
        openModal(e.state.celeb, true);
      } else {
        closeModal(true);
      }
    });

    let sx = 0, sw = false;
    D.viewport.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sw = true; }, { passive: true });
    D.viewport.addEventListener('touchend', e => {
      if (!sw) return; sw = false;
      const dx = sx - e.changedTouches[0].clientX;
      if (Math.abs(dx) > 44) goSlide(modal.idx + (dx > 0 ? 1 : -1));
    });

    init();
  </script>
</body>
</html>
